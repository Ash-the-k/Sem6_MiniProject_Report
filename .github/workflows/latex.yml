name: Build LaTeX PDF

on:
  push:
    branches:
      - main
    paths:
      - 'main.tex'
      - 'references.bib'
      - 'images/**'

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: main.pdf